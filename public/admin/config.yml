local_backend: true

backend:
  name: github
  repo: vityasyyy/melukisambelia
  branch: main
  base_url: https://melukis-sambelia.vercel.app
  auth_endpoint: /api/auth

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pariwisata"
    label: "Pariwisata"
    folder: "content/pariwisata"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Pantai", "Budaya", "Desa Wisata", "Air", "Trekking"] }
      - { label: "Desa", name: "village", widget: "select", options: ["Sugian", "Labuhan Pandan", "lainnya"] }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Galeri", name: "gallery", widget: "list", field: { name: "image", label: "Gambar", widget: "image" }, required: false }
      - { label: "Deskripsi Singkat", name: "shortDesc", widget: "string" }
      - { label: "Konten", name: "body", widget: "markdown" }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
      - { label: "Fasilitas", name: "facilities", widget: "list", required: false }
      - { label: "Catatan Akses", name: "accessNotes", widget: "string", required: false }

  - name: "irigasi"
    label: "Irigasi"
    folder: "content/irigasi"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Nama Saluran", name: "name", widget: "string" }
      - { label: "Tipe", name: "saluranType", widget: "select", options: ["Primer", "Sekunder", "Tersier"] }
      - { label: "Desa", name: "village", widget: "select", options: ["Sugian", "Labuhan Pandan", "lainnya"] }
      - { label: "Kondisi", name: "condition", widget: "select", options: ["Baik", "Rusak Ringan", "Rusak Berat"] }
      - { label: "Panjang (m)", name: "lengthM", widget: "number" }
      - { label: "Status Aliran", name: "flowStatus", widget: "select", options: ["Mengalir", "Kering", "Mengalir Sebagian"] }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Konten", name: "body", widget: "markdown" }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }

  - name: "kesehatan"
    label: "Kesehatan"
    folder: "content/kesehatan"
    create: true
    identifier_field: "facilityName"
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Nama Fasilitas", name: "facilityName", widget: "string" }
      - { label: "Tipe", name: "type", widget: "select", options: ["Posyandu", "Puskesmas", "Bidan", "Polides"] }
      - { label: "Desa", name: "village", widget: "select", options: ["Sugian", "Labuhan Pandan", "lainnya"] }
      - { label: "Jumlah Kader", name: "cadresCount", widget: "number" }
      - { label: "Program Stunting", name: "stuntingProgram", widget: "boolean" }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Konten", name: "body", widget: "markdown" }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }

  - name: "festival"
    label: "Festival"
    folder: "content/festival"
    create: true
    identifier_field: "eventName"
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Nama Acara", name: "eventName", widget: "string" }
      - { label: "Jadwal", name: "schedule", widget: "string" }
      - { label: "Lokasi", name: "venue", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "string" }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "URL Pendaftaran", name: "registrationUrl", widget: "string", required: false }
      - { label: "Konten", name: "body", widget: "markdown" }

  - name: "cerita"
    label: "Cerita"
    folder: "content/cerita"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Penulis", name: "author", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Ringkasan", name: "excerpt", widget: "string" }
      - { label: "Konten", name: "body", widget: "markdown" }

  - name: "umkm"
    label: "UMKM"
    folder: "content/umkm"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - { label: "Nama UMKM", name: "name", widget: "string" }
      - { label: "Pemilik", name: "owner", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "select", options: ["Kuliner", "Jasa", "Kerajinan", "Pertanian", "Perikanan", "Lainnya"] }
      - { label: "Desa", name: "village", widget: "select", options: ["Sugian", "Labuhan Pandan", "lainnya"] }
      - { label: "Kontak", name: "contact", widget: "string" }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Galeri", name: "gallery", widget: "list", field: { name: "image", label: "Gambar", widget: "image" }, required: false }
      - { label: "Konten", name: "body", widget: "markdown" }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }

  - name: "airtanah"
    label: "Air & Tanah"
    files:
      - label: "Data Air & Tanah"
        name: "air_tanah"
        file: "content/air-tanah/air-tanah.md"
        fields:
          - { label: "Judul", name: "title", widget: "string", default: "Air & Tanah" }
          - { label: "Deskripsi", name: "description", widget: "text", required: false }
          - { label: "Kredit", name: "credit", widget: "string", required: false }
          - label: "Pengukuran TMA & DHL"
            name: "measurements"
            widget: "list"
            required: false
            fields:
              - { label: "Lokasi", name: "location", widget: "string" }
              - { label: "Tanggal", name: "date", widget: "datetime", date_only: true }
              - { label: "TMA (m)", name: "tmaMeters", widget: "number", value_type: "float" }
              - { label: "DHL (mS)", name: "dhlMsiemens", widget: "number", value_type: "float" }

  - name: "settings"
    label: "Pengaturan Situs"
    files:
      - label: "Pengaturan"
        name: "_settings"
        file: "content/_settings.md"
        fields:
          - { label: "Gambar Hero", name: "heroImage", widget: "image" }
          - { label: "Tagline Hero", name: "heroTagline", widget: "string" }
          - label: "Statistik"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Luas", name: "luas", widget: "string" }
              - { label: "Penduduk", name: "penduduk", widget: "string" }
              - { label: "Desa Binaan", name: "desaBinaan", widget: "string" }
              - { label: "Tahun Program", name: "tahunProgram", widget: "string" }
          - { label: "Tanggal Festival", name: "festivalDates", widget: "string" }
          - label: "Sosial"
            name: "socials"
            widget: "object"
            fields:
              - { label: "Instagram", name: "instagram", widget: "string", required: false }
              - { label: "TikTok", name: "tiktok", widget: "string", required: false }
          - label: "Kontak"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Telepon", name: "phone", widget: "string", required: false }
              - { label: "Alamat", name: "address", widget: "string" }
          - label: "Intro Beranda (Section 02-05)"
            name: "homepageIntros"
            widget: "object"
            required: false
            fields:
              - { label: "02 — Kicker (Jejaki)", name: "jejakiKicker", widget: "string", default: "02 — JEJAKI" }
              - { label: "02 — Judul (Jejaki)", name: "jejakiTitle", widget: "string", default: "Jejaki Sambelia" }
              - { label: "02 — Intro (Jejaki)", name: "jejakiIntro", widget: "string", required: false }
              - { label: "03 — Kicker (Wisata)", name: "wisataKicker", widget: "string", default: "03 — WISATA UNGGULAN" }
              - { label: "03 — Judul (Wisata)", name: "wisataTitle", widget: "string", default: "Destinasi Pilihan" }
              - { label: "03 — Intro (Wisata)", name: "wisataIntro", widget: "text", default: "Destinasi wisata unggulan di Desa Sugian dan Labuhan Pandan." }
              - { label: "04 — Kicker (Festival)", name: "festivalKicker", widget: "string", default: "04 — FESTIVAL" }
              - { label: "04 — Judul (Festival)", name: "festivalTitle", widget: "string", default: "Festival Pesona Sambelia" }
              - { label: "04 — Intro (Festival)", name: "festivalIntro", widget: "text", default: "Peresean, Pawai Dulangan, dan Gendang Beleq — warisan budaya Sasak yang hidup di Sambelia." }
              - { label: "05 — Kicker (UMKM)", name: "umkmKicker", widget: "string", default: "05 — UMKM" }
              - { label: "05 — Judul (UMKM)", name: "umkmTitle", widget: "string", default: "UMKM Spotlight" }
              - { label: "05 — Intro (UMKM)", name: "umkmIntro", widget: "text", default: "Kerajinan, kuliner, dan produk lokal andalan masyarakat Sambelia." }

      - label: "Peta GIS"
        name: "_gismap"
        file: "content/_gismap.md"
        fields:
          - { label: "Judul", name: "title", widget: "string" }
          - { label: "Deskripsi", name: "description", widget: "string", required: false }
          - { label: "Kredit", name: "credit", widget: "string", required: false }

  - name: "desa"
    label: "Desa Binaan"
    folder: "content/desa"
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    identifier_field: "name"
    slug: "{{slug}}"
    fields:
      - { label: "Nama Desa", name: "name", widget: "string" }
      - { label: "Deskripsi", name: "description", widget: "text" }
      - { label: "Gambar", name: "image", widget: "image" }

  - name: "tentang"
    label: "Tentang Sambelia"
    files:
      - label: "Konten Tentang"
        name: "_tentang"
        file: "content/_tentang.md"
        fields:
          - { label: "Prose Geografi", name: "geographyProse", widget: "text" }
          - label: "Potensi Desa"
            name: "potensiDesa"
            widget: "list"
            required: false
            fields:
              - { label: "Judul", name: "title", widget: "string" }
              - { label: "Deskripsi", name: "description", widget: "text" }